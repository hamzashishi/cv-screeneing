services:
  - type: web
    name: cv-screening-backend
    env: docker
    rootDir: .
    dockerfilePath: Dockerfile
    startCommand: gunicorn -w 4 -b 0.0.0.0:$PORT cv_screening_project.wsgi:application
    envVars:
      - key: DEBUG
        value: False
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: cv-screening-backend.onrender.com,cv-screeneing-7.onrender.com,.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://cv-screening-ten.vercel.app,https://cv-screening-backend.onrender.com,https://cv-screeneing-7.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://cv-screening-ten.vercel.app,https://cv-screening-backend.onrender.com,https://cv-screeneing-7.onrender.com
      - key: SECURE_SSL_REDIRECT
        value: True
      - key: SESSION_COOKIE_SECURE
        value: True
      - key: CSRF_COOKIE_SECURE
        value: True
      - key: DATABASE_URL
        value: postgresql://user:password@host:port/dbname
      - key: JWT_SECRET_KEY
        generateValue: true
