services:
  - type: web
    name: cv-screening-backend
    env: python
    rootDir: cv-screening-backend
    buildCommand: pip install --upgrade pip setuptools wheel && pip install --no-cache-dir -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn -w 4 -b 0.0.0.0:$PORT cv_screening_project.wsgi:application
    aptPackages:
      - libjpeg-dev
      - zlib1g-dev
      - libtiff-dev
      - libfreetype6-dev
      - liblcms2-dev
      - libwebp-dev
      - libopenjp2-7-dev
      - python3-dev
      - build-essential
