name: cv-screening

services:
- name: backend
  github:
    repo: hamzashishi/cv-screeneing
    branch: main
    deploy_on_push: true
  source_dir: cv-screening-backend
  build_command: pip install -r requirements.txt && python manage.py collectstatic --noinput
  run_command: gunicorn -w 4 -b 0.0.0.0:8080 cv_screening_project.wsgi:application
  envs:
  - key: DEBUG
    value: "False"
  - key: DJANGO_SECRET_KEY
    value: ${DJANGO_SECRET_KEY}
  - key: ALLOWED_HOSTS
    value: ${APP_DOMAIN}
  - key: CORS_ALLOWED_ORIGINS
    value: "https://cv-screening-ten.vercel.app,https://${APP_DOMAIN}"
  - key: DATABASE_URL
    value: ${db.DATABASE_URL}
  - key: JWT_SECRET_KEY
    value: ${JWT_SECRET_KEY}
  - key: JWT_ALGORITHM
    value: "HS256"
  - key: JWT_EXPIRATION_DELTA
    value: "3600"
  http_port: 8080
  health_check:
    http_path: /api/
  log_destination_id: ${LOGS_ID}

databases:
- name: db
  engine: PG
  version: "14"
  production: false

envs:
- key: APP_DOMAIN
  value: ${app.domains[0].name}
