name: cv-screening
services:
- name: backend
  github:
    repo: hamzashishi/cv-screeneing
    branch: main
    deploy_on_push: true
  source_dir: cv-screening-backend
  build_command: pip install --no-cache-dir -r requirements.txt && python manage.py collectstatic --noinput
  run_command: gunicorn -w 4 -b 0.0.0.0:$PORT cv_screening_project.wsgi:application
  envs:
  - key: DEBUG
    value: "False"
  - key: DJANGO_SECRET_KEY
    scope: RUN_AND_BUILD_TIME
  - key: JWT_SECRET_KEY
    scope: RUN_AND_BUILD_TIME
  - key: ALLOWED_HOSTS
    value: ${APP_DOMAIN}
    scope: RUN_AND_BUILD_TIME
  - key: CORS_ALLOWED_ORIGINS
    value: "https://cv-screening-ten.vercel.app,https://${APP_DOMAIN}"
    scope: RUN_AND_BUILD_TIME
  - key: DATABASE_URL
    value: ${db.DATABASE_URL}
    scope: RUN_TIME
  - key: JWT_ALGORITHM
    value: HS256
    scope: RUN_TIME
  - key: JWT_EXPIRATION_DELTA
    value: "3600"
    scope: RUN_TIME
  http_port: 8080
  health_check:
    http_path: /api/
databases:
- name: db
  engine: PG
  version: "14"
  production: false
